<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice Tracker</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #root {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 400px;
            border: 2px solid #cbd5f5;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .music-icon {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .add-btn {
            background-color: #3b82f6;
            color: white;
            width: 100%;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            margin-left: 10px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 8px;
            background: #f9fafb;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div id="root">
        <div class="music-icon">🎻</div>
        <h1>Practice Tracker</h1>

        <!-- Ide jön majd az F# által generált tartalom -->
    </div>

    <script src="bundle.js"></script>
</body>
</html>
